      <line x1="332" y1="118" x2="348" y2="118" stroke="#4aa8d8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Hair back -->
    <ellipse cx="200" cy="175" rx="112" ry="130" fill="#c8d8f0"/>
    <!-- Long twin tails -->
    <path d="M115 230 Q75 290 60 370 Q55 400 70 400 Q80 400 88 380 Q95 340 100 300 Q108 265 118 248" fill="#c8d8f0"/>
    <path d="M285 230 Q325 290 340 370 Q345 400 330 400 Q320 400 312 380 Q305 340 300 300 Q292 265 282 248" fill="#c8d8f0"/>
    <!-- Hair tie ribbons -->
    <ellipse cx="112" cy="248" rx="14" ry="8" fill="#5aaac8"/>
    <ellipse cx="288" cy="248" rx="14" ry="8" fill="#5aaac8"/>

    <!-- Neck -->
    <rect x="178" y="305" width="44" height="52" rx="8" fill="#f5d8c8"/>

    <!-- Body -->
    <path d="M75 400 Q95 345 148 325 Q172 315 200 315 Q228 315 252 325 Q305 345 325 400Z" fill="#3a7ab8"/>
    <!-- Sailor collar -->
