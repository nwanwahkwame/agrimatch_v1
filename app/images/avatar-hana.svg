      <line x1="50" y1="90" x2="70" y2="90" stroke="#4aa8d8" stroke-width="2" stroke-linecap="round"/>
      <line x1="54" y1="84" x2="66" y2="96" stroke="#4aa8d8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="66" y1="84" x2="54" y2="96" stroke="#4aa8d8" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g opacity="0.5">
