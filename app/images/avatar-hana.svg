    <path d="M165 318 L172 328 L200 348 L228 328 L235 318" fill="none" stroke="#2a5a98" stroke-width="2"/>
    <line x1="200" y1="340" x2="200" y2="370" stroke="#d84040" stroke-width="3"/>

