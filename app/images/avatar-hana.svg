    <ellipse cx="283" cy="235" rx="12" ry="16" fill="#f5d8c8"/>
    <ellipse cx="117" cy="235" rx="7" ry="10" fill="#eab898"/>
    <ellipse cx="283" cy="235" rx="7" ry="10" fill="#eab898"/>

    <!-- Hair front -->
