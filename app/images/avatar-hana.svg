    <path d="M0 340 Q50 325 100 340 Q150 355 200 340 Q250 325 300 340 Q350 355 400 340 L400 400 L0 400Z" fill="#6ab5d8" opacity="0.3"/>
    <path d="M0 360 Q60 348 120 360 Q180 372 240 360 Q300 348 360 360 Q380 366 400 360 L400 400 L0 400Z" fill="#5aaac8" opacity="0.25"/>

