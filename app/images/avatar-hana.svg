<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddf0fb"/>
      <stop offset="100%" stop-color="#9ccfe8"/>
    </radialGradient>
    <radialGradient id="face2" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fef5f0"/>
      <stop offset="100%" stop-color="#f5d8c8"/>
    </radialGradient>
    <clipPath id="circle2">
      <circle cx="200" cy="200" r="195"/>
    </clipPath>
  </defs>

  <circle cx="200" cy="200" r="200" fill="url(#bg2)"/>

  <g clip-path="url(#circle2)">
