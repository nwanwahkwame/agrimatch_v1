    <ellipse cx="168" cy="238" rx="20" ry="22" fill="#fff"/>
    <ellipse cx="168" cy="240" rx="14" ry="16" fill="#2a88c8"/>
    <ellipse cx="168" cy="240" rx="9" ry="11" fill="#0d4880"/>
    <circle cx="162" cy="233" r="4.5" fill="#fff"/>
    <circle cx="174" cy="244" r="2" fill="#fff" opacity="0.6"/>
    <path d="M149 230 Q158 224 168 226" stroke="#0d4880" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="149" y1="232" x2="144" y2="226" stroke="#0d4880" stroke-width="1.5" stroke-linecap="round"/>

    <ellipse cx="232" cy="238" rx="20" ry="22" fill="#fff"/>
    <ellipse cx="232" cy="240" rx="14" ry="16" fill="#2a88c8"/>
    <ellipse cx="232" cy="240" rx="9" ry="11" fill="#0d4880"/>
    <circle cx="226" cy="233" r="4.5" fill="#fff"/>
    <circle cx="238" cy="244" r="2" fill="#fff" opacity="0.6"/>
    <path d="M251 230 Q242 224 232 226" stroke="#0d4880" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="251" y1="232" x2="256" y2="226" stroke="#0d4880" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Eyebrows -->
    <path d="M150 218 Q168 210 186 213" stroke="#90a8c8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M214 213 Q232 210 250 218" stroke="#90a8c8" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="148" cy="262" rx="22" ry="11" fill="#f0a0b0" opacity="0.28"/>
    <ellipse cx="252" cy="262" rx="22" ry="11" fill="#f0a0b0" opacity="0.28"/>

    <!-- Nose -->
    <path d="M197 270 Q200 274 203 270" stroke="#daa890" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth -->
    <path d="M186 286 Q200 298 214 286" stroke="#d88898" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Hairpin - star -->
    <polygon points="325,155 327,161 333,161 328,165 330,171 325,167 320,171 322,165 317,161 323,161" fill="#5aaac8"/>
