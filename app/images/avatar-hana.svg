    <!-- Bangs with streaks -->
    <path d="M122 205 Q132 162 155 152 Q140 178 143 215" fill="#d8e8f8"/>
    <path d="M158 152 Q175 140 200 137 Q178 158 174 215" fill="#d8e8f8"/>
    <path d="M200 137 Q225 140 242 152 Q225 158 226 215" fill="#d8e8f8"/>
    <path d="M242 152 Q265 162 278 205 Q268 178 257 215" fill="#d8e8f8"/>

    <!-- Hair highlight -->
    <ellipse cx="178" cy="158" rx="22" ry="9" fill="#eef5fc" opacity="0.8" transform="rotate(-10 178 158)"/>

