    <ellipse cx="112" cy="232" rx="13" ry="17" fill="#e8c0a0"/>
    <ellipse cx="288" cy="232" rx="13" ry="17" fill="#e8c0a0"/>
    <ellipse cx="112" cy="232" rx="8" ry="11" fill="#d4a080"/>
    <ellipse cx="288" cy="232" rx="8" ry="11" fill="#d4a080"/>

    <!-- Ear piercings -->
    <circle cx="113" cy="245" r="3.5" fill="#0aa8c8"/>
    <circle cx="113" cy="255" r="2.5" fill="#0aa8c8"/>

