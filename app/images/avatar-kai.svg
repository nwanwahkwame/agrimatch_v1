    <path d="M115 215 Q112 170 138 148 Q160 128 200 124 Q240 128 262 148 Q288 170 285 215" fill="#1a2850"/>
    <!-- Front spikes -->
    <path d="M122 208 Q130 168 150 155 Q133 182 136 220" fill="#253560"/>
    <path d="M152 156 Q168 138 192 135 Q170 158 168 222" fill="#253560"/>
    <path d="M208 135 Q232 138 248 156 Q230 158 232 222" fill="#1a2850"/>
    <path d="M248 155 Q268 168 278 208 Q270 182 264 220" fill="#1a2850"/>

