    <path d="M200 135 Q204 148 202 165 Q198 148 200 135" fill="#0aa8c8" opacity="0.7"/>
    <ellipse cx="182" cy="155" rx="12" ry="5" fill="#4a5888" opacity="0.6" transform="rotate(-15 182 155)"/>

    <!-- Eyes - sharp, teal -->
    <!-- Left eye - slightly narrower/sharper for male -->
    <ellipse cx="166" cy="237" rx="20" ry="18" fill="#fff"/>
    <ellipse cx="166" cy="238" rx="14" ry="13" fill="#0a8898"/>
    <ellipse cx="166" cy="238" rx="9" ry="9" fill="#053848"/>
    <circle cx="160" cy="233" r="4" fill="#fff"/>
    <circle cx="172" cy="243" r="2" fill="#fff" opacity="0.5"/>
    <!-- Sharp upper lid -->
    <path d="M147 230 Q157 222 166 224 Q175 222 185 230" stroke="#053848" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M147 230 Q156 235 147 242" stroke="#053848" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="234" cy="237" rx="20" ry="18" fill="#fff"/>
    <ellipse cx="234" cy="238" rx="14" ry="13" fill="#0a8898"/>
    <ellipse cx="234" cy="238" rx="9" ry="9" fill="#053848"/>
    <circle cx="228" cy="233" r="4" fill="#fff"/>
    <circle cx="240" cy="243" r="2" fill="#fff" opacity="0.5"/>
    <path d="M215 230 Q225 222 234 224 Q243 222 253 230" stroke="#053848" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M253 230 Q244 235 253 242" stroke="#053848" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows - thick, angled -->
    <path d="M145 218 Q162 208 186 214" stroke="#1a2850" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M214 214 Q238 208 255 218" stroke="#1a2850" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Scar on cheek - anime hero detail -->
    <line x1="253" y1="252" x2="265" y2="270" stroke="#c09080" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- Nose - slightly larger for male -->
    <path d="M194 272 Q200 278 206 272" stroke="#c89870" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M196 268 Q194 272 194 275" stroke="#c89870" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M204 268 Q206 272 206 275" stroke="#c89870" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth - determined expression -->
    <path d="M185 290 Q200 298 215 290" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="185" y1="290" x2="188" y2="288" stroke="#c07858" stroke-width="1.5" stroke-linecap="round"/>

