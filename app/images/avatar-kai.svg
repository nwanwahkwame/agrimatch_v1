    <line x1="0" y1="380" x2="100" y2="340" stroke="#0aa8c8" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="395" x2="80" y2="350" stroke="#0aa8c8" stroke-width="0.5" opacity="0.2"/>
    <line x1="400" y1="380" x2="300" y2="340" stroke="#0aa8c8" stroke-width="1" opacity="0.3"/>
    <line x1="400" y1="395" x2="320" y2="350" stroke="#0aa8c8" stroke-width="0.5" opacity="0.2"/>
    <circle cx="50" cy="80" r="25" fill="none" stroke="#0aa8c8" stroke-width="0.5" opacity="0.2"/>
    <circle cx="350" cy="100" r="18" fill="none" stroke="#0aa8c8" stroke-width="0.5" opacity="0.2"/>

