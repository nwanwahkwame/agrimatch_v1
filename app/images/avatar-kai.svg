    <path d="M172 320 Q186 335 200 340" stroke="#0aa8c8" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M228 320 Q214 335 200 340" stroke="#0aa8c8" stroke-width="2" fill="none" opacity="0.8"/>
