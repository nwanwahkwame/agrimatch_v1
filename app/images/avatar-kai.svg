<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </radialGradient>
    <radialGradient id="face4" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fde8d0"/>
      <stop offset="100%" stop-color="#e8c0a0"/>
    </radialGradient>
    <clipPath id="circle4">
      <circle cx="200" cy="200" r="195"/>
    </clipPath>
  </defs>

  <circle cx="200" cy="200" r="200" fill="url(#bg4)"/>

  <g clip-path="url(#circle4)">
