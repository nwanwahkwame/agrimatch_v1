<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3a2d50"/>
      <stop offset="100%" stop-color="#1a1228"/>
    </radialGradient>
    <radialGradient id="face3" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fdf0e4"/>
      <stop offset="100%" stop-color="#f0d0b0"/>
    </radialGradient>
    <radialGradient id="hair3" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#4a3a5a"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </radialGradient>
    <clipPath id="circle3">
      <circle cx="200" cy="200" r="195"/>
    </clipPath>
  </defs>

  <circle cx="200" cy="200" r="200" fill="url(#bg3)"/>

  <g clip-path="url(#circle3)">
    <!-- Stars decoration -->
    <circle cx="55" cy="70" r="2" fill="#d4b8f0" opacity="0.7"/>
    <circle cx="80" cy="45" r="1.5" fill="#d4b8f0" opacity="0.5"/>
    <circle cx="100" cy="80" r="1" fill="#d4b8f0" opacity="0.6"/>
    <circle cx="330" cy="55" r="2" fill="#d4b8f0" opacity="0.7"/>
    <circle cx="355" cy="80" r="1.5" fill="#d4b8f0" opacity="0.5"/>
    <circle cx="310" cy="85" r="1" fill="#d4b8f0" opacity="0.6"/>
    <circle cx="45" cy="120" r="1" fill="#d4b8f0" opacity="0.4"/>
    <circle cx="370" cy="120" r="1" fill="#d4b8f0" opacity="0.4"/>
    <circle cx="70" cy="150" r="1.5" fill="#d4b8f0" opacity="0.35"/>
    <circle cx="340" cy="140" r="1.5" fill="#d4b8f0" opacity="0.35"/>

    <!-- Hair back - long and dark -->
    <ellipse cx="200" cy="178" rx="110" ry="128" fill="#1a1028"/>
    <!-- Long straight hair -->
    <rect x="90" y="230" width="38" height="175" rx="19" fill="#1a1028"/>
    <rect x="272" y="230" width="38" height="175" rx="19" fill="#1a1028"/>

    <!-- Neck -->
    <rect x="178" y="307" width="44" height="50" rx="8" fill="#f0d0b0"/>

    <!-- Body - school uniform dark -->
    <path d="M72 400 Q92 346 145 326 Q170 316 200 316 Q230 316 255 326 Q308 346 328 400Z" fill="#2a1e3a"/>
    <!-- White dress shirt collar -->
    <path d="M172 320 L200 338 L228 320 L224 330 L200 346 L176 330Z" fill="#e8e0f0"/>
    <!-- Tie -->
    <path d="M196 332 L204 332 L208 360 L200 370 L192 360Z" fill="#8b3080"/>
    <line x1="200" y1="332" x2="200" y2="370" stroke="#6a2060" stroke-width="1"/>

    <!-- Face -->
    <ellipse cx="200" cy="232" rx="87" ry="94" fill="url(#face3)"/>

    <!-- Ears -->
    <ellipse cx="115" cy="234" rx="12" ry="16" fill="#f0d0b0"/>
    <ellipse cx="285" cy="234" rx="12" ry="16" fill="#f0d0b0"/>
    <ellipse cx="115" cy="234" rx="7" ry="10" fill="#dbb090"/>
    <ellipse cx="285" cy="234" rx="7" ry="10" fill="#dbb090"/>

    <!-- Small earrings -->
    <circle cx="113" cy="248" r="4" fill="#c8a0e8"/>
    <circle cx="287" cy="248" r="4" fill="#c8a0e8"/>

    <!-- Hair front -->
    <path d="M115 212 Q112 168 132 148 Q158 124 200 120 Q242 124 268 148 Q288 168 285 212" fill="#1a1028"/>
    <!-- Side swept bangs -->
    <path d="M115 208 Q120 165 145 150 Q128 178 132 218" fill="#2a1838"/>
    <path d="M145 150 Q162 135 190 133 Q165 155 162 218" fill="#2a1838"/>
    <!-- Part in middle -->
    <path d="M200 120 Q202 135 200 150" stroke="#2a1838" stroke-width="3" fill="none"/>
    <path d="M200 133 Q228 135 252 150 Q236 158 238 218" fill="#2a1838"/>
    <path d="M252 150 Q272 162 282 208 Q274 178 262 218" fill="#2a1838"/>

    <!-- Hair shine -->
    <ellipse cx="175" cy="152" rx="18" ry="7" fill="#5a4870" opacity="0.6" transform="rotate(-12 175 152)"/>
    <ellipse cx="215" cy="148" rx="12" ry="5" fill="#5a4870" opacity="0.5" transform="rotate(8 215 148)"/>

    <!-- Glasses -->
    <rect x="140" y="226" width="48" height="30" rx="8" fill="none" stroke="#9080a8" stroke-width="2"/>
    <rect x="212" y="226" width="48" height="30" rx="8" fill="none" stroke="#9080a8" stroke-width="2"/>
    <line x1="188" y1="238" x2="212" y2="238" stroke="#9080a8" stroke-width="2"/>
    <line x1="140" y1="238" x2="125" y2="232" stroke="#9080a8" stroke-width="2"/>
    <line x1="260" y1="238" x2="275" y2="232" stroke="#9080a8" stroke-width="2"/>

    <!-- Eyes - amber/gold -->
    <ellipse cx="165" cy="240" rx="16" ry="13" fill="#fff"/>
    <ellipse cx="165" cy="241" rx="11" ry="10" fill="#c8780a"/>
    <ellipse cx="165" cy="241" rx="7" ry="7" fill="#5a3000"/>
    <circle cx="160" cy="236" r="3.5" fill="#fff"/>
    <circle cx="170" cy="246" r="1.5" fill="#fff" opacity="0.6"/>

    <ellipse cx="235" cy="240" rx="16" ry="13" fill="#fff"/>
    <ellipse cx="235" cy="241" rx="11" ry="10" fill="#c8780a"/>
    <ellipse cx="235" cy="241" rx="7" ry="7" fill="#5a3000"/>
    <circle cx="230" cy="236" r="3.5" fill="#fff"/>
    <circle cx="240" cy="246" r="1.5" fill="#fff" opacity="0.6"/>

    <!-- Eyebrows - expressive -->
    <path d="M148 220 Q165 212 183 216" stroke="#3a2840" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M217 216 Q235 212 252 220" stroke="#3a2840" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Slight blush -->
    <ellipse cx="145" cy="260" rx="20" ry="10" fill="#e09070" opacity="0.2"/>
    <ellipse cx="255" cy="260" rx="20" ry="10" fill="#e09070" opacity="0.2"/>

    <!-- Nose -->
    <path d="M197 270 Q200 274 203 270" stroke="#cc9070" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth - slight smirk -->
    <path d="M187 287 Q200 295 215 284" stroke="#c07060" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Book prop -->
    <rect x="30" y="330" width="58" height="75" rx="3" fill="#6a4090"/>
    <rect x="33" y="333" width="52" height="69" rx="2" fill="#8a60b0"/>
    <line x1="42" y1="343" x2="76" y2="343" stroke="#c8a8e8" stroke-width="1.5" opacity="0.7"/>
    <line x1="42" y1="352" x2="76" y2="352" stroke="#c8a8e8" stroke-width="1.5" opacity="0.7"/>
    <line x1="42" y1="361" x2="76" y2="361" stroke="#c8a8e8" stroke-width="1.5" opacity="0.7"/>
  </g>

  <circle cx="200" cy="200" r="195" fill="none" stroke="#7a50a8" stroke-width="4"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="#5a3878" stroke-width="1.5"/>
</svg>
